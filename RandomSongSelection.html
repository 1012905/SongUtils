<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>玻璃诗乐 · 随机搜歌</title>
  <style>
    /* ------------------------ 全局设计令牌 · 粉/蓝双主题 ------------------------ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
      background: radial-gradient(circle at 20% 30%, var(--bg-glow-1), var(--bg-glow-2));
      transition: background 0.4s cubic-bezier(0.2, 0.9, 0.4, 1), color 0.2s;
      color: var(--text-primary);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glass-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.1), 0 4px 18px rgba(0, 0, 0, 0.05);
      --card-blur: blur(18px) saturate(180%);
      --surface-alpha: 0.38;
    }

    /* 粉主题 (默认) */
    body[data-theme="pink"] {
      --bg-glow-1: #ffe6f0;
      --bg-glow-2: #f8d5e6;
      --text-primary: #3a2a33;
      --text-soft: #624c58;
      --accent-solid: #d96c8e;
      --accent-light: #f7b0c4;
      --glass-bg: rgba(255, 245, 250, 0.45);
      --card-border: rgba(255, 220, 235, 0.6);
      --btn-bg: rgba(255, 240, 245, 0.7);
      --btn-hover: rgba(255, 255, 255, 0.85);
      --switch-bg: rgba(230, 210, 220, 0.55);
    }

    /* 蓝主题 */
    body[data-theme="blue"] {
      --bg-glow-1: #d9ecfe;
      --bg-glow-2: #c0dff5;
      --text-primary: #1e2f41;
      --text-soft: #3a536b;
      --accent-solid: #4f8bc9;
      --accent-light: #9bc2f0;
      --glass-bg: rgba(235, 245, 255, 0.45);
      --card-border: rgba(190, 220, 250, 0.6);
      --btn-bg: rgba(235, 245, 255, 0.7);
      --btn-hover: rgba(255, 255, 255, 0.85);
      --switch-bg: rgba(200, 220, 240, 0.55);
    }

    /* ------------------------ 毛玻璃核心卡片 · 液态通透 ------------------------ */
    .glass-panel {
      backdrop-filter: var(--card-blur);
      -webkit-backdrop-filter: var(--card-blur);
      background: var(--glass-bg);
      border: 1px solid var(--card-border);
      border-radius: 44px;
      box-shadow: var(--glass-shadow), inset 0 1px 4px rgba(255, 255, 255, 0.6);
      padding: 28px 24px;
      width: 100%;
      max-width: 520px;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    /* 内部层次强化 —— 半透叠加 */
    .glass-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.5), rgba(255,255,255,0.1) 80%);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* 让内部元素相对定位 */
    .content-wrapper {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-weight: 500;
      font-size: 2.2rem;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      background: linear-gradient(145deg, var(--text-primary), var(--text-soft));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
    }

    .subhead {
      font-size: 0.95rem;
      color: var(--text-soft);
      margin-bottom: 26px;
      border-left: 4px solid var(--accent-solid);
      padding-left: 16px;
      font-weight: 380;
      opacity: 0.9;
    }

    /* ------------------------ 主题切换 · 滑动渐变按钮 ------------------------ */
    .theme-switch-wrapper {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .theme-switch {
      display: flex;
      background: var(--switch-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 5px;
      border-radius: 48px;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 4px 8px rgba(0,0,0,0.02);
      position: relative;
    }

    .switch-option {
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      z-index: 2;
      transition: color 0.25s;
      color: var(--text-soft);
      user-select: none;
    }

    .switch-option.active {
      color: #1e1e2a;
      font-weight: 540;
    }

    .switch-slider {
      position: absolute;
      top: 5px;
      left: 5px;
      width: calc(50% - 5px);
      height: calc(100% - 10px);
      background: linear-gradient(135deg, #ffffffd6, #f0f0fad9);
      border-radius: 40px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.06), 0 1px 2px rgba(255,255,255,0.8) inset;
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), background 0.3s;
      border: 1px solid rgba(255,255,255,0.5);
    }

    /* 滑动块渐变效果由 transform 和背景光实现 */
    body[data-theme="pink"] .switch-slider {
      background: linear-gradient(145deg, #ffe2f0, #fff0f8);
    }
    body[data-theme="blue"] .switch-slider {
      background: linear-gradient(145deg, #e1f0ff, #f0f8ff);
    }
    .theme-switch[data-active="blue"] .switch-slider {
      transform: translateX(100%);
    }

    /* ------------------------ 文件上载 & 列表状态 ------------------------ */
    .upload-area {
      margin: 16px 0 20px;
    }

    .file-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .file-label {
      background: var(--btn-bg);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      padding: 12px 20px;
      border-radius: 60px;
      font-weight: 500;
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      cursor: pointer;
      transition: all 0.2s;
      flex: 1 1 auto;
      text-align: center;
      font-size: 0.95rem;
    }

    .file-label:hover {
      background: var(--btn-hover);
      border-color: var(--accent-light);
    }

    .file-label input {
      display: none;
    }

    .song-stats {
      font-size: 0.9rem;
      padding: 6px 14px;
      background: rgba(255,255,255,0.25);
      border-radius: 60px;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      color: var(--text-soft);
      border: 1px solid var(--glass-border);
      white-space: nowrap;
    }

    /* ------------------------ 当前歌曲展示 · 玻璃卡片内嵌 ------------------------ */
    .song-spotlight {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 24px 20px;
      margin: 20px 0 18px;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), 0 6px 12px -6px rgba(0,0,0,0.08);
    }

    .song-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-soft);
      margin-bottom: 6px;
    }

    .song-name {
      font-size: 2.1rem;
      font-weight: 460;
      line-height: 1.2;
      word-break: break-word;
      color: var(--text-primary);
      text-shadow: 0 2px 4px rgba(255,255,255,0.5);
    }

    .song-placeholder {
      opacity: 0.55;
      font-style: italic;
    }

    /* ------------------------ 操作按钮组 ------------------------ */
    .action-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1 1 0;
      min-width: 130px;
      padding: 16px 12px;
      border-radius: 60px;
      border: 1px solid var(--glass-border);
      background: var(--btn-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-weight: 540;
      font-size: 1.1rem;
      color: var(--text-primary);
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .btn-primary {
      background: var(--accent-solid);
      border-color: rgba(255,255,255,0.5);
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.05);
      box-shadow: 0 12px 18px -10px var(--accent-solid);
    }

    .btn-primary:hover {
      filter: brightness(1.05);
      transform: scale(0.98);
      background: var(--accent-solid);
    }

    .btn:hover {
      background: var(--btn-hover);
      border-color: var(--accent-light);
    }

    /* 内置列表提示 */
    .hint-text {
      margin-top: 16px;
      font-size: 0.8rem;
      text-align: center;
      color: var(--text-soft);
      opacity: 0.8;
    }

    /* 手机优化 */
    @media (max-width: 480px) {
      .glass-panel { padding: 22px 16px; border-radius: 36px; }
      h1 { font-size: 1.9rem; }
      .song-name { font-size: 1.8rem; }
      .btn { padding: 14px 8px; font-size: 1rem; }
      .switch-option { padding: 8px 18px; }
    }
  </style>
</head>
<!-- 
  文件名：GlassRandomBili.html
  功能：随机选择歌曲并打开B站搜索 · 粉蓝双主题 · 毛玻璃液态质感
  平台：Web / 移动优先
  标准：HTML5 · CSS3 · ES2020
-->
<body data-theme="pink">
<div class="glass-panel">
  <div class="content-wrapper">

    <!-- ------------------------ 主题切换 · 滑动渐变 ------------------------ -->
    <div class="theme-switch-wrapper">
      <div class="theme-switch" id="themeSwitch" data-active="pink">
        <div class="switch-slider" id="switchSlider"></div>
        <span class="switch-option" data-theme="pink">🌸 粉</span>
        <span class="switch-option" data-theme="blue">🌊 蓝</span>
      </div>
    </div>

    <!-- ------------------------ 标题区 ------------------------ -->
    <h1>诗乐·随机</h1>
    <div class="subhead">低透玻璃 · 跳转B站搜索</div>

    <!-- ------------------------ 歌曲库加载 ------------------------ -->
    <div class="upload-area">
      <div class="file-row">
        <label class="file-label">
          📂 选择 music.txt
          <input type="file" id="fileInput" accept=".txt,text/plain">
        </label>
        <span class="song-stats" id="songCountDisplay">🎵 内置 12 首</span>
      </div>
    </div>

    <!-- ------------------------ 当前选中歌曲展示 ------------------------ -->
    <div class="song-spotlight">
      <div class="song-label">本次随机</div>
      <div class="song-name" id="currentSongDisplay">——</div>
    </div>

    <!-- ------------------------ 操作核心 ------------------------ -->
    <div class="action-group">
      <button class="btn" id="randomBtn">🎲 随机选歌</button>
      <button class="btn btn-primary" id="searchBtn">🔍 B站搜索</button>
    </div>
    <div class="hint-text" id="extraHint">
      支持跳过表头/统计行 · 点击搜索新窗打开
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    /* ------------------------ 全局状态 · 歌曲数组 ------------------------ */
    let songList = [];                // 当前有效歌曲列表
    let currentSelectedSong = '';     // 当前选中的歌名

    // DOM 元素
    const bodyEl = document.body;
    const themeSwitch = document.getElementById('themeSwitch');
    const switchOptions = document.querySelectorAll('.switch-option');
    const songCountDisplay = document.getElementById('songCountDisplay');
    const currentSongDisplay = document.getElementById('currentSongDisplay');
    const randomBtn = document.getElementById('randomBtn');
    const searchBtn = document.getElementById('searchBtn');
    const fileInput = document.getElementById('fileInput');
    const extraHint = document.getElementById('extraHint');

    /* ------------------------ 内置默认歌单 (模拟 music.txt 结构) ------------------------ */
    const DEFAULT_SONG_TEXT = `歌名

一路向北
晴天
夜曲
反方向的钟
花海
七里香
以父之名
给我一首歌的时间
龙卷风
最长的电影
简单爱
听妈妈的话
共12首`;

    /* ------------------------ 解析器 · 跳过表头/统计行 (完全移植C++逻辑) ------------------------ */
    function parseSongsFromText(text) {
      // 处理可能的BOM
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      const lines = text.split(/\r?\n/);
      const songs = [];
      
      // 至少需要两行才能尝试跳过表头（第一行表头，第二行可能是空行或分割线）
      let startIndex = 0;
      if (lines.length >= 2) {
        startIndex = 2;   // 跳过前两行 (C++代码行为: getline两次)
      } else {
        // 行数不足，保守从0开始
        startIndex = 0;
      }

      for (let i = startIndex; i < lines.length; i++) {
        const line = lines[i].trim();    // 去除首尾空格，但保留内部空格
        if (line === '') continue;        // 空行跳过
        
        // 统计行判断: 以“共”开头且紧接数字 (模仿C++的isStatisticsLine)
        if (line.length >= 4 && line.startsWith('共') && /^\d/.test(line.charAt(1))) {
          break;   // 遇到统计行停止
        }
        songs.push(line);
      }
      return songs;
    }

    /* ------------------------ 更新UI歌曲计数 & 列表 ------------------------ */
    function updateSongList(newSongs) {
      songList = newSongs.filter(s => s.trim() !== ''); // 二次确保非空
      const count = songList.length;
      songCountDisplay.textContent = `🎵 ${count} 首`;
      if (count === 0) {
        currentSongDisplay.textContent = '⚠️ 无歌曲';
        currentSongDisplay.classList.add('song-placeholder');
        currentSelectedSong = '';
        extraHint.textContent = '请上传含有效歌名的txt，或刷新使用内置歌单';
      } else {
        // 不自动清除已选歌曲，但若当前选中不在列表内则重置
        if (currentSelectedSong && !songList.includes(currentSelectedSong)) {
          currentSelectedSong = '';
          currentSongDisplay.textContent = '——';
          currentSongDisplay.classList.add('song-placeholder');
        } else if (!currentSelectedSong && count > 0) {
          // 首次加载时随机选一首更友好
          pickRandomAndDisplay();
        } else if (currentSelectedSong) {
          currentSongDisplay.textContent = currentSelectedSong;
          currentSongDisplay.classList.remove('song-placeholder');
        }
        extraHint.textContent = `已加载 ${count} 首 · 点击随机或搜索`;
      }
    }

    /* ------------------------ 随机选取 (纯函数) ------------------------ */
    function pickRandomSongFromList(list) {
      if (!list.length) return '';
      const randomIndex = Math.floor(Math.random() * list.length);
      return list[randomIndex];
    }

    /* 随机并更新显示 */
    function pickRandomAndDisplay() {
      if (!songList.length) {
        currentSongDisplay.textContent = '❌ 无歌曲';
        currentSongDisplay.classList.add('song-placeholder');
        currentSelectedSong = '';
        return;
      }
      const picked = pickRandomSongFromList(songList);
      currentSelectedSong = picked;
      currentSongDisplay.textContent = picked;
      currentSongDisplay.classList.remove('song-placeholder');
    }

    /* ------------------------ 构建B站搜索URL并打开 (编码使用encodeURIComponent) ------------------------ */
    function openBiliSearch(keyword) {
      if (!keyword) {
        alert('没有选中的歌曲');
        return;
      }
      const base = 'https://search.bilibili.com/all?keyword=';
      const encoded = encodeURIComponent(keyword);
      const url = base + encoded;
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    /* ------------------------ 加载默认歌单 (初始化) ------------------------ */
    function loadDefaultSongs() {
      const parsed = parseSongsFromText(DEFAULT_SONG_TEXT);
      updateSongList(parsed);
      // 默认随机选一首展示
      if (parsed.length) {
        const firstPick = pickRandomSongFromList(parsed);
        currentSelectedSong = firstPick;
        currentSongDisplay.textContent = firstPick;
        currentSongDisplay.classList.remove('song-placeholder');
      }
    }

    /* ------------------------ 处理文件上传 ------------------------ */
    function handleFileUpload(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const content = e.target.result;
        const parsed = parseSongsFromText(content);
        if (parsed.length === 0) {
          alert('未从文件中解析到歌曲，请检查格式（需包含歌名，跳过表头/统计行）');
          // 回退到原有列表不变
        } else {
          updateSongList(parsed);
          // 若当前没有选中则随机一个
          if (!currentSelectedSong && parsed.length) {
            pickRandomAndDisplay();
          } else if (currentSelectedSong && !parsed.includes(currentSelectedSong)) {
            pickRandomAndDisplay();
          }
        }
        // 清空input，允许再次上传同一文件
        fileInput.value = '';
      };
      reader.readAsText(file, 'UTF-8');
    }

    /* ------------------------ 主题切换 · 滑动渐变效果 ------------------------ */
    function setTheme(theme) {
      bodyEl.setAttribute('data-theme', theme);
      themeSwitch.setAttribute('data-active', theme);
      
      // 切换active类
      switchOptions.forEach(opt => {
        const optTheme = opt.dataset.theme;
        if (optTheme === theme) {
          opt.classList.add('active');
        } else {
          opt.classList.remove('active');
        }
      });
      
      // 细微调整滑动块内的渐变 (由css变量处理)
    }

    /* ------------------------ 事件绑定 ------------------------ */
    // 主题点击
    switchOptions.forEach(opt => {
      opt.addEventListener('click', () => {
        const theme = opt.dataset.theme;
        if (theme) setTheme(theme);
      });
    });

    // 随机按钮
    randomBtn.addEventListener('click', () => {
      if (!songList.length) {
        alert('歌单为空，请上传txt或刷新页面');
        return;
      }
      pickRandomAndDisplay();
    });

    // 搜索按钮
    searchBtn.addEventListener('click', () => {
      if (!currentSelectedSong) {
        if (songList.length) {
          // 如果没有选中但列表有，自动随机一个
          pickRandomAndDisplay();
          // 等待一下确保currentSelectedSong更新
          setTimeout(() => {
            if (currentSelectedSong) openBiliSearch(currentSelectedSong);
          }, 10);
        } else {
          alert('歌单为空，无法搜索');
        }
        return;
      }
      openBiliSearch(currentSelectedSong);
    });

    // 文件上传
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFileUpload(file);
    });

    /* ------------------------ 初始化 ------------------------ */
    loadDefaultSongs();

    // 滑动块初始位置校准 (根据默认pink)
    setTheme('pink');

    // 移动端优化：触摸时无延迟
    if ('ontouchstart' in window) {
      document.querySelectorAll('.btn, .file-label, .switch-option').forEach(el => {
        el.style.touchAction = 'manipulation';
      });
    }

    // 如果希望用户未选歌时点击搜索自动随机，已处理。
    // 额外细节: 点击空白区域等

    // 支持从C++代码逻辑完全迁移 —— 统计行、表头均已实现
  })();
</script>
<!-- 
  ------------------------ 设计注解 · 毛玻璃克制细节 ------------------------
  低透背景 + 径向渐变光晕，卡片仅作点缀。粉蓝切换按钮滑动渐变过渡自然。
  移动端适配，保留所有功能：上传解析、随机、B站搜索。
  注释风格：无句号，模块分割清晰。
-->
</body>
</html>
